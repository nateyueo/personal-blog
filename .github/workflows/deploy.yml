name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build
        run: npx astro build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://personal-blog.pages.dev' }}

      - name: Verify build output
        run: |
          echo "📦 Build output summary:"
          echo "  Total files: $(find dist -type f | wc -l)"
          echo "  HTML pages: $(find dist -name '*.html' | wc -l)"
          echo "  OG images: $(find dist -path '*/og/*' -name '*.png' | wc -l)"
          ls -la dist/
